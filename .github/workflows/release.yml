name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(python3 scripts/bump_version.py ${{ inputs.version_bump }})
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch, commit, and open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=${{ steps.bump.outputs.new_version }}
          BRANCH="release/v${NEW_VERSION}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH"
          git add custom_components/elite_climate/manifest.json
          git commit -m "chore: bump version to v${NEW_VERSION}"
          git push --force origin "$BRANCH"
          
          PR_URL=$(gh pr create \
            --title "chore: release v${NEW_VERSION}" \
            --body "Automated version bump for v${NEW_VERSION}." \
            --base main)
          
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Wait for CI and merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL="${{ steps.pr.outputs.pr_url }}"
          
          # Extract PR number from URL
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          
          echo "Waiting for CI checks on PR #$PR_NUMBER..."
          # Allow CI to start before checking
          sleep 30
          gh pr checks "$PR_NUMBER" --watch --interval 30
          
          echo "CI passed. Merging PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --squash --delete-branch

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=${{ steps.bump.outputs.new_version }}
          
          # Pull latest main after merge
          git checkout main
          git pull origin main
          
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
          
          gh release create "v${NEW_VERSION}" \
            --generate-notes \
            --title "v${NEW_VERSION}"
